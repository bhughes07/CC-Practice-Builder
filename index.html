<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Practice Builder — Youth Football</title>
<meta property="og:title" content="Practice Builder — Youth Football">
<meta property="og:description" content="Drill library and practice-plan builder for youth sports coaches, by Cheat Code Coaching.">
<meta property="og:image" content="cheatcode-logo.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="cheatcode-logo.png">
<link rel="icon" type="image/png" href="cheatcode-mark.png">
<link rel="apple-touch-icon" href="cheatcode-mark.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --turf:#0446f9;
    --turf-deep:#032da2;
    --chalk:#ffffff;
    --line:#e8e9ed;
    --ink:#14161c;
    --muted:#6b7280;
    --gold:#d3d3d3;
    --hot:#c8362a;
    --cool:#4a7afb;
    --ink-black:#0b0d12;
    --ink-black-2:#12151d;
    --cut:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--ink-black);
    color:#e5e7eb;
    padding:20px 14px 90px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:820px;margin:0 auto;}
  header{margin-bottom:24px;}
  .brandHero{
    padding:34px 10px 22px;margin-bottom:22px;
    text-align:center;
    border-bottom:2px solid var(--turf);
    position:relative;
  }
  .brandHero::after{
    content:'';position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);
    width:64px;height:2px;background:#fff;
  }
  .brandLogoFull{max-width:300px;width:74%;height:auto;margin:0 auto 18px;display:block;}
  .brandTitle{
    font-family:'Anton',sans-serif;
    font-weight:400;
    font-size:clamp(40px,9vw,68px);
    line-height:.92;
    color:#fff;
    text-transform:uppercase;
    letter-spacing:.01em;
    margin:6px 0 8px;
  }
  .brandHero .eyebrow{color:var(--cool);font-size:12px;}
  .eyebrow{
    font-family:'Oswald',sans-serif;letter-spacing:.22em;text-transform:uppercase;
    font-size:11px;color:var(--cool);font-weight:600;
  }
  h1{
    font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(26px,5vw,38px);
    line-height:1.02;color:var(--turf);margin:4px 0 10px;text-transform:uppercase;
  }
  .note{font-size:13px;color:var(--muted);line-height:1.55;max-width:660px;margin-bottom:16px;}
  #introNote{color:#9199a8;}
  #introNote b{color:#fff;}

  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tabBtn{
    font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    font-size:13px;padding:11px 20px;border-radius:0;border:1.5px solid #fff;
    background:transparent;color:#fff;cursor:pointer;transition:all .15s;
  }
  .tabBtn:hover{border-color:var(--turf);color:var(--turf);}
  .tabBtn.active{background:var(--turf);border-color:var(--turf);color:#fff;}

  .bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
  button.act{
    font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    font-size:12px;background:var(--turf);color:#fff;border:none;padding:10px 16px;
    border-radius:0;cursor:pointer;transition:background .15s, transform .1s;
    clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
  }
  button.act:hover{background:var(--turf-deep);}
  button.act:active{transform:scale(.97);}
  button.act.ghost{background:transparent;color:#fff;border:1.5px solid #fff;clip-path:none;}
  button.act.ghost:hover{background:#fff;color:var(--ink-black);}
  button.act.danger{background:transparent;color:var(--hot);border:1.5px solid var(--hot);clip-path:none;}
  button.act.danger:hover{background:var(--hot);color:#fff;}
  button.act.small{padding:7px 12px;font-size:11px;}

  .bar3{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
  .colorField{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#9199a8;font-weight:600;}
  .colorField input[type=color]{width:34px;height:28px;border:1px solid #2a2e3a;border-radius:4px;padding:0;cursor:pointer;background:none;}
  .colorField input[type=text]{font-family:'Inter',sans-serif;font-size:12px;border:1px solid #2a2e3a;border-radius:4px;padding:5px 8px;width:190px;background:var(--ink-black-2);color:#fff;}
  .colorField input[type=text]:focus{outline:none;border-color:var(--turf);background:var(--ink-black-2);}
  .colorField input[type=time]{font-family:'Inter',sans-serif;font-size:12px;border:1px solid #2a2e3a;border-radius:4px;padding:5px 8px;background:var(--ink-black-2);color:#fff;}
  .colorField input[type=time]:focus{outline:none;border-color:var(--turf);background:var(--ink-black-2);}

  .saved-ind{
    font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--cool);font-weight:600;opacity:0;transition:opacity .25s;margin-left:auto;
  }
  .saved-ind.show{opacity:1;}

  /* ---- drill / slot cards ---- */
  ul.list{list-style:none;}
  li.card{
    display:block;background:var(--chalk);border:1px solid var(--line);border-left:4px solid var(--cool);
    border-radius:0;padding:14px 18px;margin-bottom:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.25);
    clip-path:polygon(0 0, calc(100% - var(--cut)) 0, 100% var(--cut), 100% 100%, 0 100%);
    transition:transform .15s, box-shadow .15s;
  }
  li.card.dragCard{cursor:grab;touch-action:pan-y;}
  li.card.dragCard:active{cursor:grabbing;}
  li.card.dragging{opacity:.5;box-shadow:0 12px 28px rgba(0,0,0,.4);}
  li.card.touchdrag{
    position:fixed;left:14px;z-index:50;max-width:792px;pointer-events:none;opacity:.96;
    box-shadow:0 16px 34px rgba(0,0,0,.45);cursor:grabbing;transition:none;
  }
  li.ph{list-style:none;margin:0 0 10px;border-radius:0;background:rgba(4,70,249,.12);border:1.5px dashed var(--turf);}
  li.card.over{border-top:2px solid var(--turf);transform:translateY(1px);}
  @media (max-width:520px){ li.card.touchdrag{left:10px;} }

  .cardTop{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .cardTitleWrap{min-width:0;}
  .cardTitle{font-family:'Oswald',sans-serif;font-weight:700;font-size:17px;letter-spacing:.01em;line-height:1.15;color:var(--ink);}
  .cardMeta{font-size:11px;color:var(--muted);margin-top:5px;display:flex;gap:10px;flex-wrap:wrap;}
  .catTag{
    font-family:'Oswald',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:3px 9px;border-radius:0;background:#eef0f1;color:#5b666c;white-space:nowrap;
  }
  .durTag{font-size:11px;color:var(--muted);white-space:nowrap;font-weight:600;}
  .cardActionsRow{display:flex;gap:6px;flex-shrink:0;}
  .smallbtn{
    font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--muted);
    background:transparent;border:1px solid var(--line);border-radius:0;padding:5px 10px;
    cursor:pointer;white-space:nowrap;transition:all .15s;
  }
  .smallbtn:hover{border-color:var(--turf);color:var(--turf);}
  .smallbtn.has{color:var(--turf);border-color:var(--turf);background:#eef3ef;}

  .cardBody{margin-top:10px;font-size:13px;color:var(--ink);line-height:1.55;}
  .cardBody .lbl{font-family:'Oswald',sans-serif;font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--turf);margin-top:10px;display:block;}
  .videoWrap{position:relative;width:100%;max-width:360px;aspect-ratio:16/9;margin-top:8px;border-radius:0;overflow:hidden;background:#000;}
  .videoWrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
  .videoLink{font-size:12px;color:var(--turf);font-weight:700;}

  .editwrap{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);}
  .editgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
  .editgrid.two{grid-template-columns:repeat(2,1fr);}
  .field{display:flex;flex-direction:column;gap:3px;}
  .field label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;}
  .field input[type=text],.field input[type=number],.field select,.field textarea{
    font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--line);border-radius:0;
    padding:7px 9px;background:#fafbfc;color:var(--ink);width:100%;
  }
  .field textarea{min-height:60px;resize:vertical;font-family:'Inter',sans-serif;line-height:1.45;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--turf);background:#fff;}
  .editactions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;}

  .divider{list-style:none;margin:18px 0 10px;padding:8px 4px 6px;border-top:2px solid var(--line);}
  .divider span{font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}

  /* ---- plan bar ---- */
  .planBar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
  .planBar select{
    font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;letter-spacing:.02em;
    padding:10px 14px;border-radius:0;border:1.5px solid #fff;color:#fff;background:transparent;cursor:pointer;
  }
  .planBar input[type=text]{
    font-family:'Inter',sans-serif;font-size:13px;padding:9px 12px;border-radius:0;
    border:1px solid #2a2e3a;background:var(--ink-black-2);color:#fff;min-width:160px;
  }
  .planBar input[type=text]:focus{outline:none;border-color:var(--turf);}
  .totalPill{
    font-family:'Anton',sans-serif;font-weight:400;font-size:20px;letter-spacing:.02em;
    background:var(--turf);color:#fff;padding:10px 16px 8px;border-radius:0;margin-left:auto;
    clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
  }

  .slotLink{
    font-size:11px;color:var(--turf);font-weight:700;background:#eef3ef;border:1px solid var(--turf);
    border-radius:0;padding:3px 9px;display:inline-block;margin-top:4px;
  }
  .slotLinkBottom{display:flex;justify-content:flex-end;margin-top:8px;}

  li.insertZone{
    list-style:none;height:14px;margin:0;position:relative;
    display:flex;align-items:center;justify-content:center;z-index:5;
  }
  .insertLine{position:absolute;left:0;right:0;top:50%;height:1px;background:transparent;transition:background .15s;pointer-events:none;}
  .insertActions{
    display:none;gap:4px;background:var(--ink-black-2);border:1px solid var(--turf);border-radius:20px;padding:4px 6px;
    box-shadow:0 2px 12px rgba(0,0,0,.5);
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;
  }
  .insertBtn{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;letter-spacing:.03em;text-transform:uppercase;
    background:transparent;border:none;color:#fff;cursor:pointer;padding:4px 8px;border-radius:12px;white-space:nowrap;
  }
  .insertBtn:hover{background:var(--turf);}
  @media (hover:hover){
    li.insertZone:hover .insertLine{background:#3a3f4d;}
    li.insertZone:hover .insertActions{display:flex;}
  }
  @media (hover:none){
    li.insertZone{height:auto;margin:6px 0;position:static;}
    li.insertZone .insertLine{display:none;}
    li.insertZone .insertActions{display:flex;position:static;transform:none;background:transparent;box-shadow:none;border:none;padding:0;}
    .insertBtn{border:1px solid #fff;}
  }

  /* ---- modal ---- */
  .modal-overlay{position:fixed;inset:0;background:rgba(4,6,10,.75);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;}
  .modal-box{
    background:#fff;border-radius:0;padding:22px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;
    box-shadow:0 24px 60px rgba(0,0,0,.5);
    clip-path:polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 0 100%);
  }
  .modal-title{font-family:'Anton',sans-serif;font-weight:400;font-size:22px;color:var(--turf);text-transform:uppercase;letter-spacing:.02em;margin-bottom:14px;}
  .pickGrid{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .pickBtn{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;padding:11px 14px;border-radius:0;
    border:1.5px solid var(--turf);background:#fff;color:var(--turf);cursor:pointer;text-align:left;transition:all .15s;
  }
  .pickBtn:hover{background:#eef3ef;border-color:var(--turf-deep);}
  .pickBtn small{display:block;font-family:'Inter',sans-serif;font-weight:400;font-size:11px;color:var(--muted);text-transform:none;letter-spacing:0;margin-top:2px;}
  .catsRow{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .catsRow input[type=text]{flex:1;font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--line);border-radius:0;padding:7px 9px;}
  .catsRow input[type=color]{width:32px;height:30px;border:1px solid var(--line);border-radius:4px;padding:0;cursor:pointer;background:none;flex-shrink:0;}
  .catRemove{color:var(--hot);background:transparent;border:none;font-size:16px;cursor:pointer;padding:2px 6px;}
  .catAddRow{display:flex;gap:8px;margin:10px 0 14px;}
  .catAddRow input{flex:1;font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--line);border-radius:0;padding:7px 9px;}

  footer{margin-top:28px;font-size:11px;color:#6b7280;line-height:1.6;border-top:1px solid #22262f;padding-top:16px;}
  footer b{color:#9199a8;}

  @media print{
    .no-print{display:none !important;}
    body{padding:0;background:#fff;color:#000;}
    .brandHero{border-bottom-color:#000;}
    li.card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;clip-path:none;}
    .videoWrap{display:none;}
  }
  @media (max-width:520px){
    li.card{padding:12px 14px;}
    .editgrid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<div class="wrap" id="appWrap">
  <header class="brandHero">
    <img src="cheatcode-logo.png" alt="Cheat Code Coaching" class="brandLogoFull">
    <h1 class="brandTitle">Practice Builder</h1>
    <div class="eyebrow" id="eyebrowText">Youth Football · Practice Builder</div>
  </header>
  <p class="note" id="introNote"></p>

  <div class="bar no-print">
    <div class="tabs">
      <button class="tabBtn active" id="tabPlans">Practice Plans</button>
      <button class="tabBtn" id="tabLibrary">Drill Library</button>
    </div>
  </div>
  <div class="bar3 no-print">
    <span class="colorField">Title <input type="text" id="eyebrowInput" placeholder="Youth Football · Practice Builder"></span>
    <span class="colorField">Primary <input type="color" id="primaryColorInput"></span>
    <span class="colorField">Accent <input type="color" id="accentColorInput"></span>
    <button class="act ghost small" id="resetColors">Reset appearance</button>
    <span id="status" class="saved-ind"></span>
  </div>

  <!-- ===== Drill Library view ===== -->
  <div id="libraryView" style="display:none">
    <div class="bar no-print">
      <button class="act" id="addDrill">+ Add drill</button>
      <select id="catFilter"></select>
      <button class="act ghost" id="manageCats">Categories</button>
    </div>
    <ul class="list" id="drillList"></ul>
  </div>

  <!-- ===== Practice Plans view ===== -->
  <div id="plansView">
    <div class="planBar no-print">
      <select id="planSelect"></select>
      <input type="text" id="planNameInput" placeholder="Practice plan name">
      <button class="act ghost small" id="newPlan">+ New</button>
      <button class="act ghost small" id="duplicatePlan">Duplicate</button>
      <button class="act danger small" id="deletePlan">Delete</button>
      <button class="act ghost small" id="shareLink"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:4px;"><path d="M12 3v12"/><path d="M7 8l5-5 5 5"/><path d="M5 13v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/></svg>Share</button>
    </div>
    <div class="planBar">
      <span class="colorField no-print">Start time <input type="time" id="planStartTime"></span>
      <span class="totalPill" id="totalPill">Total: 0 min</span>
    </div>
    <ul class="list" id="slotList"></ul>
    <div class="bar no-print">
      <button class="act" id="addSlot">+ Add slot</button>
      <button class="act ghost" id="addSlotFromDrill">+ Add from library</button>
      <button class="act ghost" id="addRotation">+ Add rotation</button>
      <button class="act ghost" id="addWaterBreak">+ Add water break</button>
    </div>
  </div>

  <footer id="footerNote"></footer>
</div>

<div class="wrap" id="sharedView" style="display:none"></div>

<script>
// ---------- Example drill library (generic — replace with your own) ----------
const DEFAULT_DRILLS = [
  {name:"Dynamic Warmup", category:"Warmup", duration:3, videoUrl:"", instructions:"Jog, high knees, butt kicks, shuffle, back pedal, sprint — down and back across the field.", coachingPoints:"Keep it moving, no standing around. Set the energy for practice."},
  {name:"Offensive Team Period", category:"Offense", duration:10, videoUrl:"", instructions:"Team period installing/reviewing offensive plays on air (no defense).", coachingPoints:"Practicing Huddle, Breaking Out of Huddle, Center Snaps to Coach, Everyone Doing their Job."},
  {name:"Defensive Team Period", category:"Defense", duration:10, videoUrl:"", instructions:"4-2 defense team install/walkthrough. Great time to show defense what you think the opponents might do. Or simply work pursuit angles and pass defense.", coachingPoints:"Slow back pedal, see the ball, break to the football; coaches show fakes to test recognition. Back side goes \"down the line\" to prevent cutback."},
  {name:"Pass Catching", category:"Offense", duration:4, videoUrl:"", instructions:"Receiver runs a route (e.g. 5-yard in) and catches a thrown ball, then turns up field. (Advanced players do longer routes, Less advanced do shorter routes)", coachingPoints:"Run fast and controlled, catch the ball with hands, then turn up field. Show them the diamond method of catching."},
  {name:"Oklahoma Drill", category:"Offense", duration:4, videoUrl:"https://www.youtube.com/watch?v=t_f4zhcKKXg", instructions:"2-on-1 offensive player turns the corner and tries to score; defender breaks on the ball to make the tackle/pull the flag.", coachingPoints:"Offensive Player - Make a move and go. Don't stop. Defensive player - chop your feet, force his direction, two hand flag grab."},
  {name:"Passing 1 on 1's", category:"Defense", duration:4, videoUrl:"", instructions:"Offensive Player runs a route. Defender tries to break up the pass. Early in the season run a simple hook, as players develop mix it up.", coachingPoints:"Back Pedal. Eyes on Quarterback. Swat Ball Down."},
  {name:"Outside Flag Pull Drill", category:"Defense", duration:4, videoUrl:"https://www.youtube.com/watch?v=eZj_gxpdz8Q", instructions:"Offensive player lines up wide and runs a jet sweep around the corner. Defender lines up over the ball, backpedals, and has to pull the flag before the sideline.", coachingPoints:"Stay square, don't overrun the angle; offense goes full speed to the corner."},
  {name:"Angle Flag Pull Drill", category:"Defense", duration:4, videoUrl:"https://www.youtube.com/watch?v=qOjf3xpPPdg", instructions:"Runner picks a direction and runs at a 45-degree angle; defender has to react and get in front to pull the flag.", coachingPoints:"React to the runner's angle, take a good pursuit angle."},
  {name:"Pass Defense", category:"Defense", duration:4, videoUrl:"", instructions:"Defender starts in position; offensive player runs a route by them and the defender has to break up the pass while the receiver tries to catch it.", coachingPoints:"Coaches yell \"Pass\" as a cue; defender should locate and attack the ball."},
  {name:"Ball Pursuit by Position", category:"Defense", duration:5, videoUrl:"", instructions:"By position (CB/LB/S), players react to one of these 3 options - 1. Pass 2. Run Right 3. Run Left.", coachingPoints:"CB: stay with receiver on pass, push receiver inside on both playside and backside runs. LB: stay with receiver on pass, get in front of ball carrier on playside run, chase down the line on backside run. S: read the QB's eyes on pass, get in front on playside run, watch cutback on backside run."},
  {name:"Basic Flag Pull Drill", category:"Defense", duration:8, videoUrl:"", instructions:"Two defenders line up shoulder to shoulder with a 1 yard gap in between. Ball carrier runs between the gap. Defensive players pull the flag closest to them. (Offensive player allows them to pull, runs half speed)", coachingPoints:"Pull flag with two hands. Punch the hip. Build repetition and muscle memory."},
  {name:"Quick Cutting Drill", category:"Agility", duration:4, videoUrl:"https://www.youtube.com/watch?v=hXNuP6ohxwQ", instructions:"Cones set in a zig-zag; ball carrier runs through, cutting hard at each cone.", coachingPoints:"Coaching making a quick cut with the plant foot. The goal is to misdirect the defender. No flag guarding."},
  {name:"4-Cone Agility", category:"Agility", duration:5, videoUrl:"https://www.youtube.com/watch?v=CYdkZbD8sjw", instructions:"Set 4 cones in a square. Players shuffle/backpedal/sprint around the cones in sequence.", coachingPoints:"Stay low, quick feet, eyes up — not looking at your feet."},
  {name:"Team Scrimmage", category:"Game", duration:10, videoUrl:"", instructions:"Live team period, offense vs defense, mixing personnel groups as needed.", coachingPoints:"Use as a rep opportunity for less experienced players on both sides of the ball."},
  {name:"Knockout", category:"Game", duration:5, videoUrl:"", instructions:"Each player has a ball in their hand. With their free hand they try to pull each other's flag. Every man for himself. Last one with a flag remaining wins.", coachingPoints:"Coaching competitiveness, flag pulling, aggressiveness. Great drill for the end of practice to give them something to look forward to."},
  {name:"Sharks & Minnows", category:"Game", duration:5, videoUrl:"https://www.youtube.com/watch?v=cOugKJxp-hc", instructions:"Classic tag-style game — \"minnows\" try to cross the field without getting their flag pulled by \"sharks.\"", coachingPoints:"Good for conditioning and change-of-direction at the end of practice."},
  {name:"2-Point Tries", category:"Offense", duration:5, videoUrl:"", instructions:"Short-yardage offense vs defense reps from close range, simulating a 2-point conversion.", coachingPoints:"Good live-tackling-adjacent rep for goal-line situations."},

const STORE_KEY='practiceBuilder:v1';
const SETTINGS_KEY=STORE_KEY+':settings';
const DEFAULT_SETTINGS={
  primary:'#0446f9',accent:'#d3d3d3',
  eyebrow:'Youth Football · Practice Builder',
  categories:[...DEFAULT_CATEGORIES],
  categoryColors:{...DEFAULT_CATEGORY_COLORS}
};

function loadSettings(){
  try{
    const raw=localStorage.getItem(SETTINGS_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      if(parsed && Array.isArray(parsed.categories) && parsed.categories.length){
        return {...DEFAULT_SETTINGS,...parsed,categoryColors:{...DEFAULT_SETTINGS.categoryColors,...(parsed.categoryColors||{})}};
      }
    }
  }catch(e){}
  return {primary:DEFAULT_SETTINGS.primary,accent:DEFAULT_SETTINGS.accent,eyebrow:DEFAULT_SETTINGS.eyebrow,categories:[...DEFAULT_SETTINGS.categories],categoryColors:{...DEFAULT_SETTINGS.categoryColors}};
}
function saveSettings(){ try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }catch(e){} }
let settings=loadSettings();

function shade(hex,percent){
  const f=parseInt(hex.slice(1),16), t=percent<0?0:255, p=Math.abs(percent);
  const R=f>>16, G=f>>8&0x00FF, B=f&0x0000FF;
  return "#"+(0x1000000+(Math.round((t-R)*p)+R)*0x10000+(Math.round((t-G)*p)+G)*0x100+(Math.round((t-B)*p)+B)).toString(16).slice(1);
}
function applyTheme(){
  const root=document.documentElement.style;
  root.setProperty('--turf', settings.primary);
  root.setProperty('--turf-deep', shade(settings.primary,-0.35));
  root.setProperty('--cool', shade(settings.primary,0.28));
  root.setProperty('--gold', settings.accent);
}

function timeToMinutes(t){
  if(!t) return null;
  const parts=t.split(':');
  const h=Number(parts[0]), m=Number(parts[1]);
  if(isNaN(h)||isNaN(m)) return null;
  return h*60+m;
}
function minutesToLabel(mins){
  if(mins==null||isNaN(mins)) return '';
  mins=((mins%1440)+1440)%1440;
  const h=Math.floor(mins/60), m=mins%60;
  const ampm = h>=12 ? 'PM' : 'AM';
  let h12=h%12; if(h12===0) h12=12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function categoryStyle(cat){
  const hex = (settings.categoryColors && settings.categoryColors[cat]) || DEFAULT_CATEGORY_COLORS[cat] || '#9aa3a8';
  return { bd: hex, bg: shade(hex,0.85), fg: shade(hex,-0.35) };
}

// ---------- Data ----------
function makeId(prefix){ return prefix+'-'+Math.random().toString(36).slice(2,9); }

function loadState(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      if(parsed && Array.isArray(parsed.drills) && Array.isArray(parsed.plans) && parsed.plans.length){
        return parsed;
      }
    }
  }catch(e){}
  const drills=DEFAULT_DRILLS.map(d=>({id:makeId('drill'),videoUrl:'',...d}));
  const byName={}; drills.forEach(d=>byName[d.name]=d.id);
  const plan={
    id:makeId('plan'),
    name:DEFAULT_PLAN.name,
    startTime:DEFAULT_PLAN.startTime,
    slots:DEFAULT_PLAN.slots.map(s=>{
      const {drillName,...rest}=s;
      return {id:makeId('slot'),...rest,drillId: drillName?byName[drillName]||null:null};
    })
  };
  return {drills, plans:[plan], activePlanId:plan.id};
}

}

function activePlan(){ return state.plans.find(p=>p.id===state.activePlanId) || state.plans[0]; }

// ---------- Video embed helper ----------
function videoEmbedHtml(url){
  if(!url) return '';
  let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{11})/);
  if(m) return `<div class="videoWrap"><iframe src="https://www.youtube.com/embed/${m[1]}" allowfullscreen loading="lazy"></iframe></div>`;
  m=url.match(/vimeo\.com\/(\d+)/);
  if(m) return `<div class="videoWrap"><iframe src="https://player.vimeo.com/video/${m[1]}" allowfullscreen loading="lazy"></iframe></div>`;
  m=url.match(/drive\.google\.com\/file\/d\/([\w-]+)/);
  if(m) return `<div class="videoWrap"><iframe src="https://drive.google.com/file/d/${m[1]}/preview" allowfullscreen loading="lazy"></iframe></div>`;
  return `<a class="videoLink" href="${url}" target="_blank" rel="noopener">Watch video</a>`;
}

function renderSharedView(data){
  document.getElementById('appWrap').style.display='none';
  const root=document.getElementById('sharedView');
  root.style.display='block';
  if(data.primary) document.documentElement.style.setProperty('--turf', data.primary);
  if(data.primary) document.documentElement.style.setProperty('--turf-deep', shade(data.primary,-0.35));
  if(data.primary) document.documentElement.style.setProperty('--cool', shade(data.primary,0.28));
  if(data.accent) document.documentElement.style.setProperty('--gold', data.accent);

  let running=timeToMinutes(data.startTime);
  const total=(data.slots||[]).reduce((s,slot)=>s+(Number(slot.duration)||0),0);

  const slotsHtml=(data.slots||[]).map(slot=>{
    const timeLabel = running!=null ? minutesToLabel(running) : '';
    running = running!=null ? running + (Number(slot.duration)||0) : null;
    const cs=categoryStyle(slot.category);
    return `
    <li class="card" style="border-left-color:${cs.bd};background:${cs.bg};">
      <div class="cardTop">
        <div class="cardTitleWrap">
          <div class="cardTitle">${timeLabel?`<span style="color:var(--muted);font-weight:400;">${timeLabel} — </span>`:''}${slot.title||'(untitled)'}</div>
          <div class="cardMeta">
            ${slot.category?`<span class="catTag" style="background:${cs.bd};color:#fff;">${slot.category}</span>`:''}
            <span class="durTag">${slot.duration||0} min</span>
            ${slot.coach?`<span class="durTag">Coach: ${slot.coach}</span>`:''}
          </div>
        </div>
      </div>
      <div class="cardBody">
        ${slot.notes?`${slot.notes}`:''}
        ${slot.instructions?`<span class="lbl">Instructions</span>${slot.instructions}`:''}
        ${slot.coachingPoints?`<span class="lbl">Coaching points</span>${slot.coachingPoints}`:''}
        ${slot.videoUrl?`<span class="lbl">Video</span>${videoEmbedHtml(slot.videoUrl)}`:''}
      </div>
    </li>`;
  }).join('');

  root.innerHTML=`
    <header class="brandHero">
      <img src="cheatcode-logo.png" alt="Cheat Code Coaching" class="brandLogoFull">
      <h1 class="brandTitle">${data.name||'Practice Plan'}</h1>
      <div class="eyebrow">Shared Practice Plan · Read-only</div>
    </header>
    <p class="note">Shared from Practice Builder. Total time: <b>${total} min</b>. To build your own drills and practice plans, <a href="${location.origin}${location.pathname}">open Practice Builder</a>.</p>
    <ul class="list">${slotsHtml}</ul>
  `;
}
async function checkSharedView(){
  const encoded=new URLSearchParams(location.search).get('share');
  if(encoded){
    try{
      const data=await decodeShareData(encoded);
      renderSharedView(data);
      return true;
    }catch(e){}
  }
  return false;
}

    wrap.querySelectorAll('input[type=text]').forEach(inp=>{
      inp.addEventListener('change',()=>{
        const idx=Number(inp.dataset.idx);
        const old=settings.categories[idx];
        const val=inp.value.trim()||old;
        settings.categories[idx]=val;
        if(val!==old){
          settings.categoryColors[val]=settings.categoryColors[old]||'#9aa3a8';
          delete settings.categoryColors[old];
        }
        state.drills.forEach(d=>{ if(d.category===old) d.category=val; });
        state.plans.forEach(p=>p.slots.forEach(s=>{ if(s.category===old) s.category=val; }));
        saveSettings(); save();
        renderList();
      });
    });
    wrap.querySelectorAll('input[type=color]').forEach(inp=>{
      inp.addEventListener('input',()=>{
        const idx=Number(inp.dataset.colorIdx);
        const cat=settings.categories[idx];
        settings.categoryColors[cat]=inp.value;
        saveSettings();
      });
    });
    wrap.querySelectorAll('.catRemove').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const idx=Number(btn.dataset.idx);
        const removed=settings.categories[idx];
        settings.categories.splice(idx,1);
        delete settings.categoryColors[removed];
        saveSettings();
        renderList();
      });
    });
  }
  renderList();
  overlay.querySelector('#addCatBtn').addEventListener('click',()=>{
    const input=overlay.querySelector('#newCatInput');
    const name=input.value.trim();
    if(!name) return;
    settings.categories.push(name);
    settings.categoryColors[name]=settings.categoryColors[name]||'#9aa3a8';
    saveSettings();
    input.value='';
    renderList();
  });
});

function bindInsertZones(){

}

function bindSlotEditPanel(id){
  const panel=slotList.querySelector(`.editwrap[data-slot-panel="${id}"]`);
  if(!panel) return;
  panel.addEventListener('mousedown',e=>e.stopPropagation());
  panel.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
  panel.querySelectorAll('[data-field]').forEach(el=>{
    el.addEventListener('change',()=>{
      const slot=findSlot(id);
      if(!slot) return;
      const field=el.dataset.field;
      slot[field]= field==='duration' ? (el.value===''?null:Number(el.value)) : el.value;
      save();
      renderPlan();
    });
  });
  const removeBtn=panel.querySelector('[data-slot-remove]');
  if(removeBtn){
    removeBtn.addEventListener('click',()=>{
      const plan=activePlan();
      plan.slots=plan.slots.filter(s=>s.id!==id);
      openSlotEditId=null;
      save('Removed');
      renderPlan();
    });
  }
  const unlinkBtn=panel.querySelector('[data-unlink]');
  if(unlinkBtn){
    unlinkBtn.addEventListener('click',()=>{
      const slot=findSlot(id);
      if(slot){ slot.drillId=null; save(); renderPlan(); }
    });
  }
  const pickBtn=panel.querySelector('[data-pick-drill]');
  if(pickBtn){
    pickBtn.addEventListener('click',()=>openDrillPicker(id));
  }
}

function confirmModal(message, confirmLabel, onConfirm){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`
    <div class="modal-box">
      <div class="modal-title">Are you sure?</div>
      <p class="note" style="margin-bottom:14px;">${message}</p>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="act ghost small" id="confirmCancel">Cancel</button>
        <button class="act danger small" id="confirmYes">${confirmLabel||'Delete'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  overlay.querySelector('#confirmCancel').addEventListener('click',()=>overlay.remove());
  overlay.querySelector('#confirmYes').addEventListener('click',()=>{ overlay.remove(); onConfirm(); });
}

function insertSlot(afterIndex, slot){
  const plan=activePlan();
  if(afterIndex==null || afterIndex>=plan.slots.length-1){
    plan.slots.push(slot);
  }else{
    plan.slots.splice(afterIndex+1, 0, slot);
  }
}

    </div>`;

  overlay.querySelector('#pickCancel').addEventListener('click',()=>overlay.remove());
  overlay.querySelectorAll('[data-pick]').forEach(btn=>{
    btn.addEventListener('click',()=>{

function openRotationModal(defaultAfterIndex){
  const plan=activePlan();
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  const defaultVal = defaultAfterIndex==null ? 'end' : (defaultAfterIndex>=plan.slots.length-1 ? 'end' : String(defaultAfterIndex));
  const positionOptions=[
    `<option value="end" ${defaultVal==='end'?'selected':''}>At the end</option>`,
    `<option value="start" ${defaultVal==='start'?'selected':''}>At the beginning</option>`
  ].concat(plan.slots.map((s,idx)=>`<option value="${idx}" ${defaultVal===String(idx)?'selected':''}>After: ${s.title||'(untitled)'}</option>`))
    .join('');
  overlay.innerHTML=`
    <div class="modal-box">
      <div class="modal-title">Add Rotation</div>
      <div class="editgrid two">
        <div class="field"><label>Number of stations</label><input type="number" id="rotStations" value="3" min="2"></div>
        <div class="field"><label>Total time (min)</label><input type="number" id="rotMinutes" value="15" min="1"></div>
      </div>
      <div class="field"><label>Category (optional, fallback for stations without a drill)</label>
        <select id="rotCategory">
          <option value="">None</option>
          ${settings.categories.map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Where in the schedule</label>
        <select id="rotPosition">${positionOptions}</select>
      </div>
      <div id="rotStationPickers"></div>
      <div class="editactions">
        <button class="act ghost small" id="rotCancel">Cancel</button>
        <button class="act small" id="rotCreate">Create</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const stationsInput=overlay.querySelector('#rotStations');
  const pickersWrap=overlay.querySelector('#rotStationPickers');
  const drillOptions=state.drills.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');

  function renderPickers(){
    const count=Math.max(2, Number(stationsInput.value)||2);
    const rows=[];
    for(let i=1;i<=count;i++){
      rows.push(`<div class="field"><label>Rotation ${i} drill</label><select data-station-idx="${i}"><option value="">— No drill —</option>${drillOptions}</select></div>`);
    }
    pickersWrap.innerHTML=rows.join('');
  }
  renderPickers();
  stationsInput.addEventListener('input', renderPickers);

  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  overlay.querySelector('#rotCancel').addEventListener('click',()=>overlay.remove());
  overlay.querySelector('#rotCreate').addEventListener('click',()=>{
    const stations=Math.max(2, Number(stationsInput.value)||3);
    const totalMin=Math.max(1, Number(overlay.querySelector('#rotMinutes').value)||15);
    const fallbackCategory=overlay.querySelector('#rotCategory').value;
    const perStation=Math.round((totalMin/stations)*10)/10;
    const newSlots=[];
    for(let i=1;i<=stations;i++){
      const picker=pickersWrap.querySelector(`select[data-station-idx="${i}"]`);
      const drill=picker&&picker.value?findDrill(picker.value):null;
      newSlots.push({
        id:makeId('slot'),
        title:drill?`Rotation ${i}: ${drill.name}`:`Rotation ${i}`,
        category:drill?drill.category:fallbackCategory,
        duration:perStation,
        coach:'',
        notes:'',
        drillId:drill?drill.id:null
      });
    }
    const posVal=overlay.querySelector('#rotPosition').value;
    if(posVal==='end'){
      plan.slots.push(...newSlots);
    }else if(posVal==='start'){
      plan.slots.unshift(...newSlots);
    }else{
      plan.slots.splice(Number(posVal)+1, 0, ...newSlots);
    }
    save('Added');
    renderPlan();
    overlay.remove();
  });
}

// ---------- Shareable link (self-contained: no account, no server, works for any recipient) ----------
// Payload is gzip-compressed before base64 encoding (when the browser supports it) so plans with a lot of
// instructional text still produce a URL short enough for link shorteners to accept.
async function encodeShareData(obj){
  const json=JSON.stringify(obj);
  const bytes=new TextEncoder().encode(json);
  let payload=bytes, compressed=false;
  if(typeof CompressionStream!=='undefined'){
    try{
      const cs=new CompressionStream('gzip');
      const writer=cs.writable.getWriter();
      writer.write(bytes); writer.close();
      payload=new Uint8Array(await new Response(cs.readable).arrayBuffer());
      compressed=true;
    }catch(e){ payload=bytes; compressed=false; }
  }
  let binary='';
  payload.forEach(b=>binary+=String.fromCharCode(b));
  const b64=btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  return (compressed?'z':'r')+b64;
}
async function decodeShareData(str){
  const compressed=str[0]==='z';
  str=str.slice(1).replace(/-/g,'+').replace(/_/g,'/');
  while(str.length%4) str+='=';
  const binary=atob(str);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  let payload=bytes;
  if(compressed){
    const ds=new DecompressionStream('gzip');
    const writer=ds.writable.getWriter();
    writer.write(bytes); writer.close();
    payload=new Uint8Array(await new Response(ds.readable).arrayBuffer());
  }
  return JSON.parse(new TextDecoder().decode(payload));
}
function buildSharePayload(plan){
  return {
    v:1,
    name:plan.name,
    startTime:plan.startTime,
    primary:settings.primary,
    accent:settings.accent,
    slots:plan.slots.map(s=>{
      const drill=s.drillId?findDrill(s.drillId):null;
      return {
        title:s.title,
        category:s.category,
        duration:s.duration,
        coach:s.coach,
        notes:s.notes,
        instructions:drill?drill.instructions:'',
        coachingPoints:drill?drill.coachingPoints:'',
        videoUrl:drill?drill.videoUrl:''
      };
    })
  };
}
async function buildShareUrl(plan){
  const encoded=await encodeShareData(buildSharePayload(plan));
  return location.origin+location.pathname+'?share='+encoded;
}

async function tryShortener(apiUrl, longUrl){
  const res=await fetch(apiUrl+encodeURIComponent(longUrl));
  if(!res.ok) throw new Error('shorten failed');
  const short=(await res.text()).trim();
  if(short && short.startsWith('http')) return short;
  throw new Error('bad response');
}
async function shortenUrl(longUrl){
  try{
    return await tryShortener('https://is.gd/create.php?format=simple&url=', longUrl);
  }catch(e){}
  try{
    return await tryShortener('https://tinyurl.com/api-create.php?url=', longUrl);
  }catch(e){}
  return longUrl;
}

document.getElementById('shareLink').addEventListener('click',async ()=>{
  const plan=activePlan();
  const btn=document.getElementById('shareLink');
  const original=btn.innerHTML;
  btn.textContent='Creating link…';
  const longUrl=await buildShareUrl(plan);
  const url=await shortenUrl(longUrl);
  btn.innerHTML=original;
  if(navigator.share){
    try{
      await navigator.share({title:plan.name, url});
      return;
    }catch(e){
      if(e && e.name==='AbortError') return;
    }
  }
  navigator.clipboard.writeText(url).then(()=>{
    btn.textContent='Link copied';setTimeout(()=>btn.innerHTML=original,1600);
  });
});

// ---------- Generic drag-reorder (shared by slot list) ----------
function bindDrag(container, onCommit){
  const cards=[...container.querySelectorAll('.dragCard')];
  let dragEl=null;
  cards.forEach(card=>{
    card.addEventListener('dragstart',e=>{
      if(e.target.closest('.editwrap')||e.target.closest('.smallbtn')){ e.preventDefault(); return; }
      dragEl=card; card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      cards.forEach(c=>c.classList.remove('over'));
      onCommit();
    });
    card.addEventListener('dragover',e=>{
      e.preventDefault();
      const after=getAfterMouse(container,e.clientY);
      cards.forEach(c=>c.classList.remove('over'));
      if(after&&after!==dragEl) after.classList.add('over');
      if(after==null){container.appendChild(dragEl);}
      else if(after!==dragEl){container.insertBefore(dragEl,after);}
    });

    let holdTimer=null, lifted=false, startY=0, startX=0, grabOffset=0, placeholder=null, lastAfter=undefined, scrollLock=null;
    function lift(t,rect){
      lifted=true;
      navigator.vibrate&&navigator.vibrate(12);
      placeholder=document.createElement('li');
      placeholder.className='ph';
      placeholder.style.height=rect.height+'px';
      card.parentNode.insertBefore(placeholder,card);
      card.classList.add('touchdrag');
      card.style.width=rect.width+'px';
      moveCard(t.clientY);
      scrollLock=document.body.style.overflow;
      document.body.style.overflow='hidden';
    }
    function moveCard(clientY){ card.style.top=(clientY-grabOffset)+'px'; }
    card.addEventListener('touchstart',e=>{
      if(lifted) return;
      if(e.target.closest('.editwrap')||e.target.closest('.smallbtn')) return;
      const t=e.touches[0];
      startY=t.clientY; startX=t.clientX;
      const rect=card.getBoundingClientRect();
      grabOffset=t.clientY-rect.top;
      lastAfter=undefined;
      holdTimer=setTimeout(()=>lift(t,rect),200);
    },{passive:true});
    card.addEventListener('touchmove',e=>{
      const t=e.touches[0];
      if(!lifted){
        if(Math.abs(t.clientY-startY)>10||Math.abs(t.clientX-startX)>10){ clearTimeout(holdTimer); }
        return;
      }
      e.preventDefault();
      moveCard(t.clientY);
      const after=getAfterTouch(container,t.clientY);
      if(after!==lastAfter){
        lastAfter=after;
        if(after==null) container.appendChild(placeholder);
        else container.insertBefore(placeholder,after);
      }
    },{passive:false});
    function endTouch(){
      clearTimeout(holdTimer);
      if(lifted){
        card.classList.remove('touchdrag');
        card.style.top=card.style.left=card.style.width='';
        if(placeholder){ placeholder.parentNode.insertBefore(card,placeholder); placeholder.remove(); placeholder=null; }
        if(scrollLock!==null){ document.body.style.overflow=scrollLock; scrollLock=null; }
        lifted=false;
        onCommit();
      }
    }
    card.addEventListener('touchend',endTouch);
    card.addEventListener('touchcancel',endTouch);
  });
}
function getAfterTouch(container,y){
  const els=[...container.querySelectorAll('.dragCard:not(.touchdrag):not(.dragging)')];
  for(const child of els){
    const box=child.getBoundingClientRect();
    if(y < box.top+box.height/2) return child;
  }
  return null;
}
function getAfterMouse(container,y){
  const els=[...container.querySelectorAll('.dragCard:not(.dragging)')];
  return els.reduce((closest,child)=>{
    const box=child.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.offset) return {offset,element:child};
    return closest;
  },{offset:-Infinity}).element;
}
function commitSlotOrder(){
  const ids=[...slotList.querySelectorAll('.dragCard')].map(c=>c.dataset.id);
  const plan=activePlan();
  plan.slots=ids.map(id=>plan.slots.find(s=>s.id===id)).filter(Boolean);
  save();
  renderPlan();
}
